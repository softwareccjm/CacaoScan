apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: app-namespace
data:
  DB_HOST: "db-service"
  DB_PORT: "5432"
  DEBUG: "False"
  ALLOWED_HOSTS: "backend-service,app.cacaoscan.com"
  USE_REDIS: "True"
  FRONTEND_URL: "https://app.cacaoscan.com"
  CORS_ALLOWED_ORIGINS: "https://app.cacaoscan.com"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: app-namespace
data:
  # Use HTTPS for internal backend service communication within the K8s cluster.
  # S5332: Clear-text protocols are insecure for transmitting sensitive data.
  # Note: If TLS termination happens at the ingress/load balancer, ensure
  # the backend-service is reachable via HTTPS or use a secure service mesh.
  VITE_API_BASE_URL: "https://backend-service:8000/api/v1"


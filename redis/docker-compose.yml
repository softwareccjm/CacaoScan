services:
  redis:
    image: redis:7-alpine
    container_name: cacaoscan_redis
    command: redis-server --appendonly yes
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cacaoscan_network

volumes:
  redis_data:
    driver: local

networks:
  cacaoscan_network:
    driver: bridge


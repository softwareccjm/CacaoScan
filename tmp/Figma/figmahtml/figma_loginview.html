<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CacaoScan</title>
    <link rel="stylesheet" href="../figmacss/figma_loginview.css">
</head>
<body>
    <!-- Vista de login con diseño profesional mejorado -->
    <div class="auth-background min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
        <!-- Elementos decorativos de fondo animados -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
            <!-- Círculos decorativos verdes con animación suave -->
            <div class="absolute top-20 left-10 w-72 h-72 bg-green-500/10 rounded-full blur-3xl animate-pulse-slow"></div>
            <div class="absolute bottom-20 right-10 w-96 h-96 bg-green-600/10 rounded-full blur-3xl animate-pulse-slow animation-delay-2000"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-green-400/5 rounded-full blur-3xl animate-pulse-slow animation-delay-4000"></div>
            
            <!-- Líneas decorativas sutiles -->
            <div class="absolute top-0 left-1/4 w-px h-96 bg-gradient-to-b from-transparent via-green-500/20 to-transparent"></div>
            <div class="absolute bottom-0 right-1/4 w-px h-96 bg-gradient-to-t from-transparent via-green-500/20 to-transparent"></div>
        </div>

        <!-- Contenedor principal con animación de entrada -->
        <div class="auth-form-container w-full max-w-md relative z-10 animate-slide-up">
            <!-- Badge superior mejorado con efecto hover -->
            <div class="absolute -top-4 left-1/2 -translate-x-1/2">
                <div class="group relative bg-gradient-to-r from-green-500 to-green-600 text-white px-5 py-2 rounded-full shadow-xl flex items-center gap-2 text-sm font-semibold hover:shadow-2xl hover:scale-105 transition-all duration-300">
                    <!-- Efecto de brillo en hover -->
                    <div class="absolute inset-0 rounded-full bg-white/20 opacity-0 group-hover:opacity-100 blur-xl transition-opacity duration-300"></div>
                    <svg class="w-4 h-4 relative z-10 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                    </svg>
                    <span class="relative z-10">Plataforma certificada SENA</span>
                </div>
            </div>

            <!-- Contenido del formulario -->
            <div class="py-10 px-6 sm:px-10">
                <div class="login-form-content">
                    <!-- Header con mejor presentación visual -->
                    <div class="text-center mb-10">
                        <div class="logo-placeholder mx-auto h-16 w-auto mb-5 animate-fade-in drop-shadow-lg">
                            <!-- Logo placeholder - reemplazar con imagen real -->
                            <div class="bg-green-600 text-white rounded-lg p-4 text-2xl font-bold">CacaoScan</div>
                        </div>
                        <h2 class="text-3xl font-bold text-gray-900 mb-2">Iniciar Sesión</h2>
                        <p class="text-gray-600 text-base">Accede a tu cuenta de CacaoScan</p>
                    </div>

                    <!-- Mensaje de estado mejorado con ícono -->
                    <div id="statusMessage" class="status-message hidden mb-6 p-4 rounded-xl flex items-start gap-3">
                        <svg class="status-icon w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p class="text-sm font-medium status-text"></p>
                    </div>

                    <!-- Formulario con inputs mejorados -->
                    <form id="loginForm" class="space-y-5">
                        <!-- Email/Username con ícono y mejor presentación -->
                        <div>
                            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                                <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                                Email o Usuario
                            </label>
                            <div class="relative">
                                <input
                                    id="email"
                                    name="email"
                                    type="text"
                                    autocomplete="email"
                                    required
                                    class="w-full pl-4 pr-4 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500/50 focus:border-green-500 transition-all duration-200"
                                    placeholder="usuario@ejemplo.com"
                                />
                                <!-- Indicador de validación -->
                                <div class="validation-indicator absolute inset-y-0 right-0 pr-3 flex items-center hidden">
                                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                                    </svg>
                                </div>
                            </div>
                            <p class="error-message mt-1.5 text-sm text-red-600 font-medium flex items-center gap-1 hidden">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <span class="error-text"></span>
                            </p>
                        </div>

                        <!-- Contraseña con mejor interacción visual -->
                        <div>
                            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-2">
                                <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                                Contraseña
                            </label>
                            <div class="relative">
                                <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    autocomplete="current-password"
                                    required
                                    class="w-full pl-4 pr-12 py-3 border-2 border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500/50 focus:border-green-500 transition-all duration-200"
                                    placeholder="••••••••••••"
                                />
                                <button
                                    type="button"
                                    id="togglePassword"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center hover:bg-gray-50 rounded-r-lg transition-all duration-200"
                                    title="Mostrar contraseña"
                                >
                                    <svg
                                        id="eyeIcon"
                                        class="h-5 w-5 text-gray-400 hover:text-green-600"
                                        fill="none"
                                        stroke="currentColor"
                                        viewBox="0 0 24 24"
                                    >
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L12 12m-3.122-3.122l4.243 4.243M12 12l3 3m0 0l6-6" />
                                    </svg>
                                </button>
                            </div>
                            <p class="error-message mt-1.5 text-sm text-red-600 font-medium flex items-center gap-1 hidden">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <span class="error-text"></span>
                            </p>
                        </div>

                        <!-- Recordar sesión y recuperación de contraseña con mejor estilo -->
                        <div class="flex items-center justify-between pt-1">
                            <div class="flex items-center group">
                                <input
                                    id="remember"
                                    name="remember"
                                    type="checkbox"
                                    class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded cursor-pointer"
                                />
                                <label for="remember" class="ml-2.5 block text-sm text-gray-700 cursor-pointer group-hover:text-gray-900 transition-colors">
                                    Recordar sesión
                                </label>
                            </div>
                            <a
                                href="/reset-password"
                                class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors flex items-center gap-1 group/link"
                            >
                                <span>¿Olvidaste tu contraseña?</span>
                                <svg class="w-4 h-4 group-hover/link:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                                </svg>
                            </a>
                        </div>

                        <!-- Botón de envío mejorado con mejor feedback visual -->
                        <button
                            type="submit"
                            class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-xl shadow-lg text-base font-semibold text-white bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 focus:outline-none focus:ring-4 focus:ring-green-500/50 transition-all duration-200 hover:shadow-xl active:scale-[0.97] group"
                        >
                            <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                            </svg>
                            <span>Iniciar Sesión</span>
                        </button>
                    </form>

                    <!-- Separador con mejor presentación -->
                    <div class="mt-8">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-200"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-4 bg-white text-gray-500 flex items-center gap-2">
                                    <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                                    </svg>
                                    ¿No tienes cuenta?
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- Link a registro con estilo mejorado -->
                    <div class="mt-6">
                        <a
                            href="/registro"
                            class="w-full flex justify-center items-center gap-2 py-3 px-4 border-2 border-gray-200 rounded-xl shadow-sm text-base font-semibold text-gray-700 bg-white hover:bg-gray-50 hover:border-green-300 focus:outline-none focus:ring-4 focus:ring-green-500/30 transition-all duration-200 hover:shadow-md active:scale-[0.97] group"
                        >
                            <svg class="w-5 h-5 group-hover:scale-110 group-hover:rotate-12 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                            </svg>
                            <span class="group-hover:text-green-600 transition-colors">Crear nueva cuenta</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Footer decorativo mejorado con información adicional -->
            <div class="border-t border-gray-200 px-6 sm:px-10 py-4 bg-gradient-to-b from-gray-50/50 to-gray-100/30 rounded-b-2xl">
                <!-- Información de seguridad -->
                <div class="text-center space-y-3">
                    <p class="text-xs text-gray-500 flex items-center justify-center gap-1.5">
                        <svg class="w-3.5 h-3.5 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                        </svg>
                        <span class="font-medium">Protegido con encriptación de nivel empresarial</span>
                    </p>
                    
                    <!-- Indicadores de confianza -->
                    <div class="flex items-center justify-center gap-4 text-xs text-gray-400">
                        <div class="flex items-center gap-1">
                            <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                            <span>SSL/TLS</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <svg class="w-3 h-3 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
                                <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm9.707 5.707a1 1 0 00-1.414-1.414L9 12.586l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                            </svg>
                            <span>Verificado</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Link de retorno mejorado con efecto hover -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-10">
            <a href="/" class="group bg-white/10 backdrop-blur-sm hover:bg-white/20 text-white hover:text-white px-5 py-2.5 rounded-full flex items-center gap-2 text-sm font-medium transition-all duration-300 border border-white/20 hover:border-white/40">
                <svg class="w-4 h-4 group-hover:-translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span class="group-hover:translate-x-0.5 transition-transform duration-300">Volver al inicio</span>
            </a>
        </div>
    </div>
</body>
</html>

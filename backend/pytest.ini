[pytest]
DJANGO_SETTINGS_MODULE = cacaoscan.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --reuse-db
    --nomigrations
    --tb=short
    -v
    --cache-clear
    --ignore=api/tests/test_admin_audit_views.py
    --ignore=api/tests/test_finca_serializers.py
    --ignore=api/tests/test_management_commands.py
    --ignore=api/tests/test_middleware.py
    --ignore=api/tests/test_notification_views.py
    --ignore=api/tests/test_profile_service.py
    --ignore=api/tests/test_registration_service.py
    --ignore=api/tests/test_serializers_common.py
    --ignore=api/tests/test_training_views.py
    --ignore=images_app/tests/test_export_views.py
    --ignore=images_app/tests/test_images_serializers.py
    --ignore=images_app/tests/test_management_service.py
    --ignore=images_app/tests/test_storage_service.py
    --ignore=images_app/tests/test_upload_dataset_command.py
    --ignore=images_app/tests/test_views.py
    --ignore=fincas_app/tests/test_finca_crud_service.py
    --ignore=fincas_app/tests/test_finca_mixins.py
    --ignore=fincas_app/tests/test_finca_stats_service.py
    --ignore=fincas_app/tests/test_finca_views.py
    --ignore=fincas_app/tests/test_lote_service.py
    --ignore=personas/tests/test_personas_serializers.py
    --ignore=personas/tests/test_views.py
    --ignore=reports/tests/test_excel_analisis.py
    --ignore=reports/tests/test_excel_usuarios.py
    --ignore=reports/tests/test_excel_agricultores.py
    --ignore=reports/tests/test_report_download_views.py
    --ignore=reports/tests/test_views.py
    --ignore=training/tests/test_calibrate_dataset_pixels.py
    --ignore=training/tests/test_train_all_models_command.py
    --ignore=catalogos/tests/test_catalogos_serializers.py
    --ignore=catalogos/tests/test_management_commands.py
    --ignore=catalogos/tests/test_models.py
    --ignore=catalogos/tests/test_views.py
testpaths = 
    api/tests
    core/tests
    images_app/tests
    fincas_app/tests
    personas/tests
    reports/tests
    training/tests
    users/tests
    audit/tests
    notifications/tests
    auth_app/tests
    catalogos/tests
    legal/tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    skip_db_errors: marks tests that fail due to database schema mismatches
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::DeprecationWarning:reportlab
    ignore:.*declare_namespace.*:DeprecationWarning
    ignore:.*load_module.*:DeprecationWarning
    ignore:.*ast.NameConstant.*:DeprecationWarning


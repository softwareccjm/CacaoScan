[pytest]
DJANGO_SETTINGS_MODULE = cacaoscan.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --reuse-db
    --nomigrations
    --tb=short
    -v
testpaths = 
    api/tests
    core/tests
    images_app/tests
    fincas_app/tests
    personas/tests
    reports/tests
    training/tests
    users/tests
    audit/tests
    notifications/tests
    auth_app/tests
    catalogos/tests
    legal/tests


[pytest]
DJANGO_SETTINGS_MODULE = cacaoscan.settings
python_files = tests.py test_*.py *_tests.py

# Fuerza base de datos PostgreSQL
# --reuse-db: Reutiliza la base de datos de test si existe
# --create-db: Crea la base de datos si no existe
# Si hay conflictos, usar solo --reuse-db
addopts = --reuse-db

# Configuración de advertencias
# Mostrar advertencias pero no fallar los tests por ellas
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
    ignore::DeprecationWarning:importlib._bootstrap
    ignore::DeprecationWarning:reportlab
    ignore::DeprecationWarning:django.db.models.constraints
    ignore::UserWarning:django.core.handlers.base
    # Suprimir advertencias de Django 6.0 sobre CheckConstraint.check en migraciones antiguas
    # Estas advertencias vienen de migraciones antiguas que no se pueden modificar sin riesgo
    ignore:CheckConstraint.check is deprecated.*:DeprecationWarning
    ignore:.*RemovedInDjango60Warning.*:DeprecationWarning

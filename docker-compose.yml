x-common-env: &common-env
  - .env

x-backend-health: &backend-health
  test: ["CMD", "curl", "-fsS", "http://localhost:18001/health"]
  interval: 30s
  timeout: 15s
  retries: 10
  start_period: 360s

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: cacaoscan_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PORT: 15432
    command: ["postgres", "-p", "15432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:18432:15432"
      # Host: 18432, Container: 15432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 15432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private
      - public

  # Redis para (futuros) Channels
  redis:
    image: redis:7-alpine
    container_name: cacaoscan-redis
    restart: unless-stopped
    env_file: *common-env
    command:
      - redis-server
      - "--port"
      - "16379"
      - "--requirepass"
      - "${REDIS_PASSWORD:-default_redis_password}"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:18379:16379"
      # Host: 18379, Container: 16379
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 16379 -a ${REDIS_PASSWORD:-default_redis_password} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - private
      - public

  # Backend Django
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime-base
    container_name: cacaoscan_backend
    env_file: *common-env
    environment:
      DB_HOST: db
      DB_PORT: 15432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      USE_REDIS: ${USE_REDIS:-True}
      USE_CELERY_REDIS: ${USE_CELERY_REDIS:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-default_redis_password}

      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      # Montar el código para desarrollo (evita reconstruir la imagen)
      - ./backend:/app
      # Excluir directorios que no deben montarse desde el host
      - /app/staticfiles
      - /app/media
      # Montar específicamente directorios de datos necesarios para ML
      - ./backend/media/datasets:/app/media/datasets
      - ./backend/media/cacao_images:/app/media/cacao_images
      # Mantenemos el volumen con nombre para los estáticos
      - backend_static:/app/staticfiles
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["gunicorn", "cacaoscan.wsgi:application", "--bind", "0.0.0.0:18001", "--workers", "4", "--timeout", "120", "--reload"]
    ports:
      - "127.0.0.1:18000:18001"
      # Host: 18000, Container: 18001
    # Habilitar GPU para entrenamiento ML (opcional, solo si está disponible)
    # Si no hay GPU, el contenedor funcionará normalmente usando CPU
    # DESCOMENTAR LA SIGUIENTE SECCIÓN SOLO SI TIENES GPU NVIDIA DISPONIBLE Y CONFIGURADA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # Alternativa: usar runtime nvidia si está disponible (más flexible)
    # runtime: nvidia  # Descomentar si deploy no funciona y tienes GPU NVIDIA
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *backend-health
    networks:
      - private
      - public

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime-base
    container_name: cacaoscan_celery_worker
    environment:
      DB_HOST: db
      DB_PORT: 15432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      USE_REDIS: ${USE_REDIS:-True}
      USE_CELERY_REDIS: ${USE_CELERY_REDIS:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-default_redis_password}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      - ./backend:/app
      - /app/staticfiles
      - /app/media
      - ./backend/media/datasets:/app/media/datasets
      - ./backend/media/cacao_images:/app/media/cacao_images
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["celery", "-A", "cacaoscan", "worker", "--loglevel=info", "--concurrency=4", "--max-tasks-per-child=1"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - private
      - public
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime-base
    container_name: cacaoscan_celery_beat
    environment:
      DB_HOST: db
      DB_PORT: 15432
      DB_NAME: ${DB_NAME:-cacaoscan_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      USE_REDIS: ${USE_REDIS:-True}
      USE_CELERY_REDIS: ${USE_CELERY_REDIS:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-default_redis_password}@redis:16379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-default_redis_password}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
      PYTHONHASHSEED: random
      PKG_RESOURCES_CACHE_DIR: /tmp/pkg_resources_cache
    volumes:
      - ./backend:/app
      - /app/staticfiles
      - /app/media
      - ./backend/media/datasets:/app/media/datasets
      - ./backend/media/cacao_images:/app/media/cacao_images
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["celery", "-A", "cacaoscan", "beat", "--loglevel=info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - private
      - public
    restart: unless-stopped

  # Frontend Vue/Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000/api/v1}
    container_name: cacaoscan_frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000/api/v1}
    ports:
      - "127.0.0.1:18080:18081"
      # Host: 18080, Container: 18081
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:18081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - public
      - private

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  # --- 'backend_media' ya no es necesario aquí si usamos bind mount ---
  # backend_media:
  #   driver: local

networks:
  private:
    driver: bridge
    internal: true
  public:
    driver: bridge
x-common-env: &common-env
  - .env

x-backend-health: &backend-health
  test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  db:
    image: postgres:16-alpine
    container_name: cacaoscan-db
    restart: unless-stopped
    env_file: *common-env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  redis:
    image: redis:7-alpine
    container_name: cacaoscan-redis
    restart: unless-stopped
    env_file: *common-env
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - private

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: backend
      args:
        APP_VERSION: ${APP_VERSION:-v1.3.0}
    image: cacaoscan-backend:${APP_VERSION:-v1.3.0}
    container_name: cacaoscan-backend
    restart: unless-stopped
    env_file: *common-env
    environment:
      SERVICE_ROLE: web
      DJANGO_STATIC_ROOT: /var/www/staticfiles
      DJANGO_MEDIA_ROOT: /var/www/media
    tmpfs:
      - /tmp:size=128m
    volumes:
      - backend_static:/var/www/staticfiles
      - backend_media:/var/www/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *backend-health
    networks:
      - private
      - public

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: celery
      args:
        APP_VERSION: ${APP_VERSION:-v1.3.0}
    image: cacaoscan-celery:${APP_VERSION:-v1.3.0}
    container_name: cacaoscan-celery-worker
    restart: unless-stopped
    env_file: *common-env
    environment:
      SERVICE_ROLE: worker
      CELERY_QUEUES: default
      DJANGO_STATIC_ROOT: /var/www/staticfiles
      DJANGO_MEDIA_ROOT: /var/www/media
    volumes:
      - backend_media:/var/www/media:rw
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "celery -A cacaoscan inspect ping -d celery@$(hostname)"
      interval: 45s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - private

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: celery
      args:
        APP_VERSION: ${APP_VERSION:-v1.3.0}
    image: cacaoscan-celery:${APP_VERSION:-v1.3.0}
    container_name: cacaoscan-celery-beat
    restart: unless-stopped
    env_file: *common-env
    environment:
      SERVICE_ROLE: beat
      DJANGO_STATIC_ROOT: /var/www/staticfiles
      DJANGO_MEDIA_ROOT: /var/www/media
    volumes:
      - backend_media:/var/www/media:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "celery -A cacaoscan beat --help > /dev/null"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-v1.3.0}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    image: cacaoscan-frontend:${APP_VERSION:-v1.3.0}
    container_name: cacaoscan-frontend
    restart: unless-stopped
    env_file: *common-env
    ports:
      - "127.0.0.1:5173:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - public
      - private

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local

networks:
  private:
    driver: bridge
    internal: true
  public:
    driver: bridge

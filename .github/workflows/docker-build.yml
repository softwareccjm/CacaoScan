name: build-test-and-publish

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  APP_VERSION: v1.3.0
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    name: Backend • Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cacaoscan_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: cacaoscan.settings
          APP_ENV: test
          DB_NAME: cacaoscan_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: ci-test-secret-key-not-for-production
          USE_REDIS: "False"
          USE_CELERY_REDIS: "False"
        run: pytest --maxfail=1 --disable-warnings -q -n auto

  frontend-tests:
    name: Frontend • Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: frontend
        run: pnpm test -- --run

  docker-build:
    name: Docker • ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            target: backend
          - image: celery
            context: ./backend
            target: celery
          - image: frontend
            context: ./frontend
            target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase registry
        run: echo "REGISTRY=ghcr.io/${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          tags: |
            ${{ env.REGISTRY }}/cacaoscan-${{ matrix.image }}:${{ env.APP_VERSION }}
            ${{ env.REGISTRY }}/cacaoscan-${{ matrix.image }}:${{ github.sha }}
          push: ${{ github.event_name == 'push' }}
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  security-scan:
    name: Seguridad • Trivy (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image: [backend, celery, frontend]
    env:
      TRIVY_USERNAME: ${{ github.actor }}
      TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute lowercase registry
        run: echo "REGISTRY=ghcr.io/${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Run Trivy on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/cacaoscan-${{ matrix.image }}:${{ github.sha }}
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

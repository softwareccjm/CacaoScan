    - name: Start backend server
      working-directory: ./backend
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10
        
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Start frontend server
      working-directory: ./frontend
      run: |
        npm run preview -- --port 4173 --host 0.0.0.0 &

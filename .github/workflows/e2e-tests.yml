name: E2E Tests CI/CD

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Ejecutar diariamente a las 2 AM

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        browser: [chrome, firefox, edge]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm ci
        npm run prepare
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup test database
      working-directory: ./backend
      run: |
        python manage.py migrate
        python manage.py loaddata test_data.json
        
    - name: Start backend server
      working-directory: ./backend
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10
        
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Start frontend server
      working-directory: ./frontend
      run: |
        npm run preview -- --port 4173 --host 0.0.0.0 &
        sleep 5
        
    - name: Wait for servers
      run: |
        npx wait-on http://localhost:8000/api/health/ http://localhost:4173
        
    - name: Run E2E tests
      working-directory: ./frontend
      run: |
        npx cypress run --browser ${{ matrix.browser }} --headless
      env:
        CYPRESS_baseUrl: http://localhost:4173
        CYPRESS_apiUrl: http://localhost:8000
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: cypress-results-${{ matrix.browser }}-${{ matrix.node-version }}
        path: |
          frontend/cypress/screenshots
          frontend/cypress/videos
          frontend/cypress/results
          
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-${{ matrix.browser }}-${{ matrix.node-version }}
        path: frontend/cypress/reports/

  e2e-tests-smoke:
    runs-on: ubuntu-latest
    needs: e2e-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm ci
        npm run prepare
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Setup test database
      working-directory: ./backend
      run: |
        python manage.py migrate
        python manage.py loaddata test_data.json
        
    - name: Start backend server
      working-directory: ./backend
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10
        
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Start frontend server
      working-directory: ./frontend
      run: |
        npm run preview -- --port 4173 --host 0.0.0.0 &
        sleep 5
        
    - name: Wait for servers
      run: |
        npx wait-on http://localhost:8000/api/health/ http://localhost:4173
        
    - name: Run smoke tests
      working-directory: ./frontend
      run: |
        npx cypress run --spec "cypress/e2e/smoke/*.cy.js" --browser chrome --headless
      env:
        CYPRESS_baseUrl: http://localhost:4173
        CYPRESS_apiUrl: http://localhost:8000

  e2e-tests-performance:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code

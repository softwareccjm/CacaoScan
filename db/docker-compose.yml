services:
  db:
    image: postgres:16-alpine
    container_name: cacaoscan_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cacaoscan_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cacaoscan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cacaoscan_network

volumes:
  postgres_data:
    driver: local

networks:
  cacaoscan_network:
    driver: bridge


sonar.projectKey=cacao-scan
sonar.projectName=CacaoScan
sonar.projectVersion=1.0

# === FUENTES ===
# El backend es tu código fuente real
sonar.sources=backend,frontend

# === TESTS ===
# SONAR: especifica dónde están las pruebas
sonar.tests=backend/tests

# === EXCLUSIONES ===
sonar.exclusions=**/vendor/**,**/node_modules/**,**/storage/**,**/bootstrap/cache/**,**/public/build/**,**/public/vendor/**,**/public/dist/**,**/venv/**,**/dist/**,**/build/**,**/__pycache__/**,**/*.pyc,**/migrations/**,backend/tests/**

# Excluir archivos __init__.py de la cobertura (son archivos de inicialización sin lógica de negocio)
sonar.coverage.exclusions=**/__init__.py

# === PYTHON ===
sonar.python.version=3.12

# === COVERAGE ===
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# Use relative paths in coverage reports
sonar.python.coverage.relativePaths=true

# === EXCLUSIONES ===
sonar.exclusions=**/vendor/**,**/node_modules/**,**/storage/**,**/bootstrap/cache/**,**/public/build/**,**/public/vendor/**,**/public/dist/**,**/venv/**,**/dist/**,**/build/**,**/__pycache__/**,**/*.pyc,**/migrations/**,**/tests/**,**/test_*.py,frontend/**/__tests__/**,frontend/**/*.test.js,frontend/**/*.spec.js

# === PYTHON ===
sonar.python.version=3.12

# === COVERAGE ===
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Archivos sin lógica de negocio que NO deben contar en la cobertura
sonar.coverage.exclusions=**/__init__.py,**/admin.py,**/apps.py,**/asgi.py,**/wsgi.py,**/settings.py,**/urls.py,**/routing.py,**/manage.py,**/conftest.py,**/run_tests.py,**/verify_python_version.py,**/cache_config.py,**/close_test_db_connections.py,**/check_test_imports.py,frontend/src/App.vue,frontend/src/main.js,frontend/src/components/common/BaseFormField.example.vue,frontend/src/services/api/index.js,frontend/src/test/mocks/**/*,**/tests/**,**/test_*.py,frontend/vite.config.js,frontend/__tests__/vite.config.test.js

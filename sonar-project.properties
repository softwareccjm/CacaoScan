sonar.projectKey=cacao-scan
sonar.projectName=CacaoScan
sonar.projectVersion=1.0
sonar.host.url=https://sonarqube.dataguaviare.com.co
sonar.token=sqa_da5bebb853ae97d3ab6cc94837519b3beee05b32

# Connection timeout settings (in milliseconds)
# Increase timeout for large report uploads
sonar.ws.timeout=600000
sonar.ws.connectionTimeout=60000

# ============================
#        FUENTES
# ============================
sonar.sources=backend,frontend

# ============================
#        TESTS
# ============================
# Backend tests
sonar.tests=backend/tests

# Marcar archivos Cypress como tests (para que Sonar no los trate como código)
sonar.test.inclusions=cypress/e2e/**/*.cy.js

# ============================
#        EXCLUSIONES
# ============================
# Directorios generados que NO son código
sonar.exclusions=**/vendor/**,\
**/node_modules/**,\
**/storage/**,\
**/bootstrap/cache/**,\
**/public/build/**,\
**/public/vendor/**,\
**/public/dist/**,\
**/venv/**,\
**/dist/**,\
**/build/**,\
**/__pycache__/**,\
**/*.pyc,\
**/migrations/**

# ============================
#        COVERAGE
# ============================
# Excluir archivos init y Cypress de cobertura
sonar.coverage.exclusions=**/__init__.py,**/cypress/**/*,**/*.cy.js

# Backend Python coverage
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.coverage.relativePaths=true

# Frontend JavaScript coverage (Jest / Vitest)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ============================
#        PYTHON
# ============================
sonar.python.version=3.12

sonar.projectKey=cacao-scan
sonar.projectName=CacaoScan
sonar.projectVersion=1.0
sonar.host.url=https://sonarqube.dataguaviare.com.co
# Token should be provided via environment variable SONAR_TOKEN
# Example: export SONAR_TOKEN=your_token_here (Linux/Mac)
# Example: set SONAR_TOKEN=your_token_here (Windows)
sonar.sources=.

sonar.ws.connectionTimeout=60000
sonar.sources=backend,frontend

# === TESTS ===
# SONAR: especifica dónde están las pruebas
sonar.tests=backend/tests

# === EXCLUSIONES ===
sonar.exclusions=**/vendor/**,**/node_modules/**,**/storage/**,**/bootstrap/cache/**,**/public/build/**,**/public/vendor/**,**/public/dist/**,**/venv/**,**/dist/**,**/build/**,**/__pycache__/**,**/*.pyc,**/migrations/**,backend/tests/**

# === PYTHON ===
sonar.python.version=3.12

# === COVERAGE ===
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.coverage.exclusions=**/__init__.py,cypress/**/*,**cypress/e2e/**/*.cy.js,frontend/src/App.vue,frontend/src/main.js,frontend/src/components/common/BaseFormField.example.vue,frontend/src/services/api/index.js